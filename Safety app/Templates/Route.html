{% load static %}

<!DOCTYPE html>

<html lang="en">
<head>

<meta charset="UTF-8">
<title>Route Routing | Women Safety AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<script>

function validate(formObj)
{
if(formObj.t1.value.length==0)
{
alert("Please enter area name");
formObj.t1.focus();
return false;
}
return true;
}

</script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

/* LAYOUT */

body{
display:flex;
min-height:100vh;
background:#f4f6fb;
}

/* SIDEBAR */

.sidebar{
width:240px;
background:linear-gradient(180deg,#ff6a9c,#ff3d7f);
color:white;
padding-top:30px;
position:fixed;
height:100%;
}

.sidebar h2{
text-align:center;
margin-bottom:30px;
}

.sidebar ul{
list-style:none;
}

.sidebar ul li{
padding:15px 25px;
}

.sidebar ul li a{
color:white;
text-decoration:none;
display:block;
border-radius:6px;
}

.sidebar ul li a:hover{
background:rgba(255,255,255,0.25);
}

/* MAIN */

.main{
margin-left:240px;
flex:1;
display:flex;
flex-direction:column;
}

/* HEADER */

.header{
background:white;
padding:18px 30px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.header h1{
color:#ff3d7f;
font-size:20px;
}

/* CONTENT */

.container{
padding:40px;
display:flex;
justify-content:center;
}

/* CARD */

.card{
width:600px;
background:white;
padding:35px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

/* TITLE */

.card h2{
text-align:center;
margin-bottom:25px;
color:#ff3d7f;
}

/* MESSAGE */

.message{
text-align:center;
color:blue;
margin-bottom:15px;
}

/* INPUT */

.input-group{
margin-bottom:20px;
}

.input-group label{
font-size:14px;
}

.input-group input{
width:100%;
padding:10px;
margin-top:5px;
border-radius:6px;
border:1px solid #ccc;
}

/* BUTTON */

.submit-btn{
width:100%;
padding:12px;
background:#ff3d7f;
border:none;
color:white;
font-size:16px;
border-radius:6px;
cursor:pointer;
}

.submit-btn:hover{
background:#e0316c;
}

/* MOBILE */

@media(max-width:900px){

.sidebar{
width:200px;
}

.main{
margin-left:200px;
}

}

@media(max-width:700px){

.sidebar{
display:none;
}

.main{
margin-left:0;
}

}

</style>

</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

<h2>Women Safety AI</h2>

<ul>

<li><a href="{% url 'TrainML' %}">Train Neural Network</a></li>

<li><a href="{% url 'Route' %}">Safe Routing</a></li>

<li><a href="{% url 'CrimePredict' %}">Crime Prediction</a></li>

<li><a href="{% url 'Panic' %}">Panic Alert</a></li>

<li><a href="{% url 'Heatmap' %}">Heatmap</a></li>

<li><a href="{% url 'index' %}">Logout</a></li>

</ul>

</div>

<!-- MAIN -->

<div class="main">

<div class="header">
<h1>Route Routing</h1>
</div>

<div class="container">

<div class="card">

<h2>Find Safe Route</h2>

<div class="message">
{{ data|safe }}
</div>

<form name="f1" method="post" action="{% url 'RouteAction' %}" onsubmit="return validate(this)">

{% csrf_token %}

<div class="input-group">
<label>Area Name</label>
<input type="text" name="t1" placeholder="Enter area name">
</div>

<button type="submit" class="submit-btn">Find Route</button>

</form>

</div>

</div>

</div>

</body>
</html>
