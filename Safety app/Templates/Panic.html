{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Panic Reporting | Women Safety ML</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
display:flex;
min-height:100vh;
background:#f4f6fb;
}

.sidebar{
width:240px;
background:linear-gradient(180deg,#ff6a9c,#ff3d7f);
color:white;
padding-top:30px;
position:fixed;
height:100%;
}

.sidebar h2{
text-align:center;
margin-bottom:30px;
}

.sidebar ul{
list-style:none;
}

.sidebar ul li{
padding:15px 25px;
}

.sidebar ul li a{
color:white;
text-decoration:none;
display:block;
border-radius:6px;
}

.sidebar ul li a:hover{
background:rgba(255,255,255,0.25);
}

.main{
margin-left:240px;
flex:1;
display:flex;
flex-direction:column;
}

.header{
background:white;
padding:18px 30px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.header h1{
color:#ff3d7f;
font-size:20px;
}

.container{
padding:40px;
display:flex;
justify-content:center;
}

.card{
width:600px;
background:white;
padding:35px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

.card h2{
text-align:center;
margin-bottom:25px;
color:#ff3d7f;
}

.message{
text-align:center;
color:blue;
margin-bottom:15px;
}

.location-box{
text-align:center;
margin-bottom:20px;
font-size:14px;
color:#333;
}

.submit-btn{
width:100%;
padding:12px;
background:#ff3d7f;
border:none;
color:white;
font-size:16px;
border-radius:6px;
cursor:pointer;
}

.submit-btn:hover{
background:#e0316c;
}

@media(max-width:900px){
.sidebar{
width:200px;
}

.main{
margin-left:200px;
}
}

@media(max-width:700px){
.sidebar{
display:none;
}

.main{
margin-left:0;
}
}

</style>

<script>

function getLocation(){

if(navigator.geolocation){

navigator.geolocation.getCurrentPosition(

function(position){

var lat = position.coords.latitude;
var lon = position.coords.longitude;

var link = "https://maps.google.com/?q=" + lat + "," + lon;

document.getElementById("location").value = link;

document.getElementById("showLocation").innerHTML =
"Live Location:<br><a href='"+link+"' target='_blank'>"+link+"</a>";

},

function(error){

document.getElementById("showLocation").innerHTML =
"Unable to fetch location. Please allow location access.";

},

{
enableHighAccuracy:true,
timeout:10000,
maximumAge:0
}

);

}else{

document.getElementById("showLocation").innerHTML =
"Geolocation not supported by browser.";

}

}

window.onload = getLocation;

</script>

</head>

<body>

<div class="sidebar">

<h2>Women Safety AI</h2>

<ul>
<li><a href="{% url 'TrainML' %}">Train Neural Network</a></li>
<li><a href="{% url 'Route' %}">Safe Routing</a></li>
<li><a href="{% url 'CrimePredict' %}">Crime Prediction</a></li>
<li><a href="{% url 'Panic' %}">Panic Alert</a></li>
<li><a href="{% url 'Heatmap' %}">Heatmap</a></li>
<li><a href="{% url 'index' %}">Logout</a></li>
</ul>

</div>

<div class="main">

<div class="header">
<h1>Panic Reporting</h1>
</div>

<div class="container">

<div class="card">

<h2>Send Emergency Alert</h2>

<div class="message">
{{ data|safe }}
</div>

<div class="location-box" id="showLocation">
Detecting your live location...
</div>

<form method="post" action="{% url 'PanicAction' %}">

{% csrf_token %}

<input type="hidden" name="location" id="location">

<button type="submit" class="submit-btn">
Send Emergency Alert
</button>

</form>

</div>

</div>

</div>

</body>
</html>
